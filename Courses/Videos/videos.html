<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Player</title>

    <script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="videos.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Course Content</h2>
            <div class="sidebar-progress">
                <span class="progress-text" id="progress-text">Loading...</span>
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="lectures-label"><i class="fa-solid fa-book-open"></i> LECTURES</div>

        <!-- Dynamic Lecture List (Populated by JS) -->
        <div class="lecture-list" id="lecture-list"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- TOP BAR (Toggle Button) -->
        <div class="top-bar">
            <!-- Breadcrumbs or Course Title could go here -->
            <div class="breadcrumbs">
                <span id="course-title-crumb">Loading...</span> / <span id="lesson-title-crumb">...</span>
            </div>

            <button class="theme-toggle-btn" id="themeBtn">
                <i class="fa-solid fa-sun"></i> <span>Light Mode</span>
            </button>
        </div>
        
        <!-- Video Player Container -->
        <div class="video-container">
            <div class="video-screen">
                <!-- Backend Dev: <video> tag would go here -->
            </div>
            
            <!-- Custom Video Controls Overlay -->
            <div class="video-controls">
                <div class="progress-track">
                    <div class="progress-bar"></div>
                </div>
                <div class="controls-row">
                    <div class="controls-left">
                        <button class="control-btn"><i class="fa-solid fa-pause"></i></button>
                        <button class="control-btn"><i class="fa-solid fa-volume-high"></i></button>
                        <div class="time-display">
                            <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
                        </div>
                    </div>
                    <div class="controls-right">
                        <span class="speed-control">1x <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i></span>
                        <button class="control-btn"><i class="fa-solid fa-gear"></i></button>
                        <button class="control-btn"><i class="fa-solid fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lesson Meta Data -->
        <div class="lesson-meta">
            <h1 id="lesson-title-main">Loading...</h1>
            <div class="meta-row">
                <span id="lesson-duration">Duration: 00:00</span>
                <span class="status-badge" id="lesson-status">
                    <i class="fa-solid fa-circle-check"></i> Completed
                </span>
            </div>
            
            <!-- Navigation Buttons -->
            <div class="nav-buttons">
                <button class="nav-btn prev" id="prev-btn">
                    <i class="fa-solid fa-backward-step"></i> <span id="prev-btn-text">Previous</span>
                </button>
                <button class="nav-btn next" id="next-btn">
                    <span id="next-btn-text">Next</span> <i class="fa-solid fa-forward-step"></i>
                </button>
            </div>
        </div>

    </main>

    <script src="videos.js"></script>
</body>
</html>
