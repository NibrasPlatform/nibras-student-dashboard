<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Learning Insights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="learning-insights.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-area">
            <img src="../../assets/images/logo-light.png" alt="Nibras Logo" class="sidebar-logo" id="app-logo">
        </div>

        <ul class="nav-menu">
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-book-open"></i> Courses</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-trophy"></i> Competitions</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-users"></i> Community</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-medal"></i> Achievements</a></li>
            <!-- Active State -->
            <li class="nav-item"><a href="#" class="nav-link active"><i class="fa-solid fa-robot"></i> AI Tutor</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-chart-simple"></i> Analytics</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>

        <div class="user-profile">
            <div class="avatar-circle">ZA</div>
            <div class="user-info">
                <h4>Ziad Alaa</h4>
                <span>student</span>
            </div>
        </div>
        
        <div class="reputation-box">
            <span>Reputation</span>
            <div class="rep-badge">1250</div>
        </div>

        <button class="logout-btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- HEADER -->
        <header class="top-header">
            <div class="search-bar-global">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search courses, problems">
            </div>
            
            <div class="header-actions">
                <button class="icon-btn" id="themeBtn"><i class="fa-regular fa-moon"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <div class="profile-circle-small">ZA</div>
            </div>
        </header>

        <div class="content-wrapper">
            
            <!-- Page Title -->
            <div class="page-title-section">
                <h1><i class="fa-solid fa-brain" style="color:var(--accent-blue); margin-right:10px;"></i> AI Learning Assistant</h1>
                <p>Get personalized help and intelligent tutoring</p>
            </div>

            <!-- Navigation Tabs -->
            <div class="ai-tabs-container">
                <button class="ai-tab">AI Tutor</button>
                <button class="ai-tab">Recommendations</button>
                <button class="ai-tab active">Learning Insights</button>
                <button class="ai-tab">Smart Routing</button>
            </div>

            <!-- Insights Grid -->
            <div class="insights-grid">
                
                <!-- Learning Analytics Card -->
                <section class="card insight-card">
                    <div class="card-header-simple">
                        <h3>Learning Analytics</h3>
                    </div>
                    <div class="analytics-list" id="analytics-container">
                        <!-- JS Injected -->
                    </div>
                </section>

                <!-- Strength & Weakness Analysis Card -->
                <section class="card insight-card">
                    <div class="card-header-simple">
                        <h3>Strength & Weakness Analysis</h3>
                    </div>
                    <div class="strength-list" id="strength-container">
                        <!-- JS Injected -->
                    </div>
                </section>

            </div>

        </div>
    </main>

    <script src="learning-insights.js"></script>
</body>
</html>
