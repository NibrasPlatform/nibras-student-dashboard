<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Sign Up</title>
<script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>
    <script>
    tailwind.config = {
        darkMode: ['selector', '[data-theme="dark"]'],
        theme: {
            extend: {
                fontFamily: { sans: ['Inter', 'sans-serif'] },
            }
        }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./signup.css">
    <script>
        window.NibrasApiConfig = {
            googleClientId: '809028632276-sgttn83goo7em2anm7t0t5ar37m4v8nm.apps.googleusercontent.com'
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative overflow-x-auto min-h-screen" style="background:linear-gradient(135deg,#051030 0%,#0a1e5e 100%)">

    <div id="app-root" hidden></div>

    <div class="stars-container">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>

    <header class="absolute top-0 left-0 w-full px-12 py-8 flex justify-between items-center z-50">
        <img src="/Assets/images/logo-dark.png" alt="Nibras Logo" class="w-[140px] h-auto object-contain">
        <button class="bg-transparent border-none text-2xl cursor-pointer text-white w-[45px] h-[45px] flex items-center justify-center rounded-full hover:scale-110 hover:bg-white/10 transition" id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <div class="w-full min-h-screen flex items-center justify-center relative z-[5] pt-28 pb-8 px-4">
        <div class="w-full max-w-[480px] p-12 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.2)] text-center mx-auto my-4" style="background:#ffffff">
            
            <h2 class="text-[1.8rem] font-bold mb-8 text-[#111827] dark:text-white">Create an account</h2>
            <p id="signupNotice" class="auth-notice mb-4 p-3 rounded-lg border border-[#d1d5db] text-[#6b7280] text-sm text-left" hidden></p>

            <form id="signupForm">
                <div class="text-left mb-5">
                    <label class="block text-sm font-medium mb-1.5 text-[#374151] dark:text-[#d1d5db]">Name</label>
                    <input type="text" id="nameInput" placeholder="Your full name" required class="w-full px-4 py-3 border border-[#e5e7eb] rounded-md bg-[#f9fafb] text-[#111827] outline-none text-sm focus:border-[#2563eb] focus:bg-white dark:bg-[#1e1e1e] dark:border-[#333] dark:text-white dark:focus:bg-black dark:focus:border-[#3b82f6]">
                </div>

                <div class="text-left mb-5">
                    <label class="block text-sm font-medium mb-1.5 text-[#374151] dark:text-[#d1d5db]">Email (Gmail only)</label>
                    <input type="email" id="emailInput" placeholder="name@gmail.com" required class="w-full px-4 py-3 border border-[#e5e7eb] rounded-md bg-[#f9fafb] text-[#111827] outline-none text-sm focus:border-[#2563eb] focus:bg-white dark:bg-[#1e1e1e] dark:border-[#333] dark:text-white dark:focus:bg-black dark:focus:border-[#3b82f6]">
                </div>

                <div class="text-left mb-5">
                    <label class="block text-sm font-medium mb-1.5 text-[#374151] dark:text-[#d1d5db]">Password</label>
                    <div class="relative">
                        <input type="password" placeholder="Enter your password" id="passInput" required class="w-full px-4 py-3 pr-10 border border-[#e5e7eb] rounded-md bg-[#f9fafb] text-[#111827] outline-none text-sm focus:border-[#2563eb] focus:bg-white dark:bg-[#1e1e1e] dark:border-[#333] dark:text-white dark:focus:bg-black dark:focus:border-[#3b82f6]">
                        <i class="fa-regular fa-eye toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-[#9ca3af] cursor-pointer" onclick="togglePass('passInput', this)"></i>
                    </div>
                </div>

                <div class="text-left mb-5">
                    <label class="block text-sm font-medium mb-1.5 text-[#374151] dark:text-[#d1d5db]">Confirm Password</label>
                    <div class="relative">
                        <input type="password" placeholder="Confirm your password" id="confPassInput" required class="w-full px-4 py-3 pr-10 border border-[#e5e7eb] rounded-md bg-[#f9fafb] text-[#111827] outline-none text-sm focus:border-[#2563eb] focus:bg-white dark:bg-[#1e1e1e] dark:border-[#333] dark:text-white dark:focus:bg-black dark:focus:border-[#3b82f6]">
                        <i class="fa-regular fa-eye toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-[#9ca3af] cursor-pointer" onclick="togglePass('confPassInput', this)"></i>
                    </div>
                </div>

                <button type="submit" class="w-full py-3.5 bg-[#2563eb] hover:bg-[#1d4ed8] text-white border-none rounded-md text-base font-semibold cursor-pointer transition flex items-center justify-center mt-6">Sign Up</button>
            </form>

            <form id="otpForm" hidden>
                <h3 class="text-left text-lg mb-2 text-[#111827] dark:text-white">Verify your email OTP</h3>
                <p class="text-[#6b7280] dark:text-[#9ca3af] text-sm text-left mt-2 mb-2.5">We sent a 6-digit OTP to <strong id="otpEmailLabel"></strong>. Enter it below to activate your account.</p>
                <div class="text-left mb-5">
                    <label class="block text-sm font-medium mb-1.5 text-[#374151] dark:text-[#d1d5db]">Email (Gmail only)</label>
                    <input type="email" id="otpEmailInput" placeholder="name@gmail.com" required class="w-full px-4 py-3 border border-[#e5e7eb] rounded-md bg-[#f9fafb] text-[#111827] outline-none text-sm focus:border-[#2563eb] focus:bg-white dark:bg-[#1e1e1e] dark:border-[#333] dark:text-white dark:focus:bg-black dark:focus:border-[#3b82f6]">
                </div>
                <div class="text-left mb-5">
                    <label class="block text-sm font-medium mb-1.5 text-[#374151] dark:text-[#d1d5db]">OTP code</label>
                    <input type="text" id="otpCodeInput" placeholder="6-digit OTP" maxlength="6" inputmode="numeric" required class="w-full px-4 py-3 border border-[#e5e7eb] rounded-md bg-[#f9fafb] text-[#111827] outline-none text-sm focus:border-[#2563eb] focus:bg-white dark:bg-[#1e1e1e] dark:border-[#333] dark:text-white dark:focus:bg-black dark:focus:border-[#3b82f6]">
                </div>
                <button type="submit" class="w-full py-3.5 bg-[#2563eb] hover:bg-[#1d4ed8] text-white border-none rounded-md text-base font-semibold cursor-pointer transition flex items-center justify-center mt-4">Verify OTP</button>
                <button type="button" id="otpBackBtn" class="w-full mt-3 py-3.5 border border-[#d1d5db] dark:border-[#4b5563] rounded-md bg-transparent text-inherit text-sm font-semibold cursor-pointer">Back to sign up</button>
            </form>

            <div class="flex items-center text-[#6b7280] dark:text-[#9ca3af] my-4 text-sm" aria-hidden="true">
                <div class="flex-1 border-b border-[#d1d5db] dark:border-[#4b5563]"></div>
                <span class="px-2">or</span>
                <div class="flex-1 border-b border-[#d1d5db] dark:border-[#4b5563]"></div>
            </div>
            <div id="googleSignInContainer" class="flex justify-center min-h-[42px]"></div>
            <p id="googleAuthStatus" class="auth-note text-[#6b7280] dark:text-[#9ca3af] text-sm text-center mt-2.5" hidden></p>

            <div class="mt-4 text-sm text-[#6b7280] dark:text-[#9ca3af]">
                <span>Are You Instructor ?</span> 
                <a href="./signupInstructor/signup-ins.html" class="text-[#2563eb] dark:text-[#60a5fa] no-underline font-semibold ml-1">Sign Up</a>
            </div>

            <div class="text-sm text-[#6b7280] dark:text-[#9ca3af] mt-2">
                Already Have An Account ? <a href="../loginPage/login.html" class="text-[#2563eb] dark:text-[#60a5fa] no-underline font-semibold ml-1">Log In</a>
            </div>

        </div>
    </div>

        <script src="../../config.js"></script>
        <script src="../../react-bootstrap.js"></script>
        <script src="https://accounts.google.com/gsi/client" async defer data-google-gsi="true"></script>
    <script src="./signup.js"></script>
</body>
</html>
