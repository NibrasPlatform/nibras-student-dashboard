<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Login</title>
<script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>
    <script>
    tailwind.config = {
        darkMode: ['selector', '[data-theme="dark"]'],
        theme: {
            extend: {
                fontFamily: { sans: ['Inter', 'sans-serif'] },
            }
        }
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./login.css">
    <script>
        window.NibrasApiConfig = {
            googleClientId: '809028632276-sgttn83goo7em2anm7t0t5ar37m4v8nm.apps.googleusercontent.com'
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen overflow-hidden" style="background:var(--left-panel-bg)">

    <div id="app-root" hidden></div>

    <div class="flex w-full min-h-screen flex-col md:flex-row">

        <!-- LEFT: Branding -->
        <div class="w-full md:w-1/2 bg-[var(--left-panel-bg)] p-[clamp(2rem,5vw,4rem)] flex flex-col justify-between gap-4 min-h-[200px] md:min-h-screen">
            <div>
                <img src="/Assets/images/logo-dark.png" alt="Nibras Logo" class="w-[150px]" id="brand-logo-img"> 
            </div>
            <div>
                <h1 class="text-[var(--left-text)] text-[clamp(1.8rem,3.6vw,3.2rem)] font-light italic leading-[1.12]">Welcome.</h1>
                <h1 class="text-[var(--left-text)] text-[clamp(1.8rem,3.6vw,3.2rem)] font-light italic leading-[1.12]">Start your journey<br>now with our<br>Education<br>Platform!</h1>
            </div>
        </div>

        <!-- RIGHT: Form -->
        <div class="w-full md:w-1/2 bg-[var(--bg-right)] flex items-center justify-center relative overflow-y-auto min-h-auto md:min-h-screen">

            <button class="absolute top-8 right-8 bg-transparent border-none text-lg text-[var(--text-main)] cursor-pointer" id="themeBtn">
                <i class="fa-regular fa-moon"></i>
            </button>

            <div class="w-full max-w-[420px] p-8 max-h-[calc(100dvh-2rem)] overflow-y-auto">

                <h2 class="text-center text-[1.8rem] text-[var(--text-main)] mb-10 font-semibold">Login to your account</h2>
                <p id="loginNotice" class="auth-notice text-sm p-3 rounded-lg border border-[var(--input-border)] bg-[var(--input-bg)] text-[var(--text-secondary)] mb-4" hidden></p>

                <form id="otpVerifyForm" class="mb-5 p-3 border border-dashed border-[var(--input-border)] rounded-xl bg-[var(--input-bg)]" hidden>
                    <h3 class="text-[var(--text-main)] text-base mb-1.5">Verify your email OTP</h3>
                    <p class="text-[var(--text-secondary)] text-sm mb-3">Your account is pending verification. Enter the OTP sent to your Gmail inbox.</p>
                    <div class="mb-3">
                        <label class="block text-sm text-[var(--text-secondary)] mb-1.5">Email (Gmail only)</label>
                        <input type="email" id="otpEmailInput" placeholder="name@gmail.com" required class="w-full px-4 py-3 border border-[var(--input-border)] rounded-md bg-[var(--input-bg)] text-[var(--text-main)] outline-none text-sm focus:border-[var(--input-focus)]">
                    </div>
                    <div class="mb-3">
                        <label class="block text-sm text-[var(--text-secondary)] mb-1.5">OTP code</label>
                        <input type="text" id="otpCodeInput" inputmode="numeric" maxlength="6" placeholder="6-digit OTP" required class="w-full px-4 py-3 border border-[var(--input-border)] rounded-md bg-[var(--input-bg)] text-[var(--text-main)] outline-none text-sm focus:border-[var(--input-focus)]">
                    </div>
                    <button type="submit" class="btn-login">Verify OTP</button>
                </form>

                <!-- Role Selector -->
                <div class="flex gap-4 mb-8">
                    <div class="role-card flex-1 border border-[var(--card-border)] rounded-lg py-5 px-2 text-center cursor-pointer bg-[var(--card-bg)] text-[var(--text-main)] flex flex-col items-center gap-2 transition hover:border-[var(--card-hover-border)] active" onclick="selectRole(this)">
                        <i class="fa-solid fa-graduation-cap text-xl"></i>
                        <span class="text-sm font-medium">Student</span>
                    </div>
                    <div class="role-card flex-1 border border-[var(--card-border)] rounded-lg py-5 px-2 text-center cursor-pointer bg-[var(--card-bg)] text-[var(--text-main)] flex flex-col items-center gap-2 transition hover:border-[var(--card-hover-border)]" onclick="selectRole(this)">
                        <i class="fa-solid fa-chalkboard-user text-xl"></i>
                        <span class="text-sm font-medium">Instructor</span>
                    </div>
                    <div class="role-card flex-1 border border-[var(--card-border)] rounded-lg py-5 px-2 text-center cursor-pointer bg-[var(--card-bg)] text-[var(--text-main)] flex flex-col items-center gap-2 transition hover:border-[var(--card-hover-border)]" onclick="selectRole(this)">
                        <i class="fa-solid fa-user-shield text-xl"></i>
                        <span class="text-sm font-medium">Admin</span>
                    </div>
                </div>

                <!-- Inputs -->
                <form id="loginForm">
                    <div class="mb-5">
                        <label class="block text-sm text-[var(--text-secondary)] mb-1.5">Email (Gmail only)</label>
                        <input type="email" id="emailInput" placeholder="name@gmail.com" value="name@gmail.com" class="w-full px-4 py-3 border border-[var(--input-border)] rounded-md bg-[var(--input-bg)] text-[var(--text-main)] outline-none text-sm focus:border-[var(--input-focus)]">
                    </div>

                    <div class="mb-5">
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="text-sm text-[var(--text-secondary)]">Password</label>
                            <a href="../Reset%20Password/Email/email.html" class="text-sm text-[#2563eb] no-underline">Forgot ?</a>
                        </div>
                        <div class="relative">
                            <input type="password" placeholder="Enter your password" id="passwordInput" class="w-full px-4 py-3 pr-10 border border-[var(--input-border)] rounded-md bg-[var(--input-bg)] text-[var(--text-main)] outline-none text-sm focus:border-[var(--input-focus)]">
                            <i class="fa-regular fa-eye toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-[#9ca3af] cursor-pointer" onclick="togglePassword()"></i>
                        </div>
                    </div>

                    <div class="mb-6 pt-2 border-t border-[var(--input-border)] mt-6">
                        <label class="flex items-center gap-2 text-sm text-[var(--text-main)] cursor-pointer font-medium">
                            <input type="checkbox" checked class="w-4 h-4 accent-[var(--checkbox-border)] cursor-pointer">
                            Remember Me
                        </label>
                    </div>

                    <button type="submit" class="btn-login">Login now</button>

                    <div class="text-center mt-6 text-sm text-[var(--text-secondary)]">
                        Don't Have An Account ? <a href="../signupPage/signup.html" class="text-[#2563eb] no-underline font-medium">Sign Up</a>
                    </div>
                </form>

                <div class="flex items-center text-[var(--text-secondary)] my-4 text-sm" aria-hidden="true">
                    <div class="flex-1 border-b border-[var(--input-border)]"></div>
                    <span class="px-2">or</span>
                    <div class="flex-1 border-b border-[var(--input-border)]"></div>
                </div>
                <div id="googleSignInContainer" class="flex justify-center min-h-[42px]"></div>
                <p id="googleAuthStatus" class="auth-note text-[var(--text-secondary)] text-sm text-center mt-2" hidden></p>
            </div>

        </div>

    </div>

    <script src="../../config.js"></script>
    <script src="../../react-bootstrap.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer data-google-gsi="true"></script>
    <script src="./login.js"></script>
</body>
</html>
