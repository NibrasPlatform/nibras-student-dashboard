<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments</title>
    <script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="/Courses/Assignments/Assignments.css">
</head>
<body>
    <div id="app-root" hidden></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Course Content</h2>
            <div class="sidebar-progress">
                <span class="progress-text">2 of 8 lectures completed</span>
                <div class="progress-bar-container">
                    <div class="progress-fill" style="width: 25%"></div>
                </div>
            </div>
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="../Course%20Description/courseContent.html" class="nav-link">
                    <i class="fa-solid fa-book-open"></i> Course Overview
                </a>
            </li>
            <li class="nav-item">
                <a href="../Videos/videos.html" class="nav-link">
                    <i class="fa-solid fa-video"></i> Videos
                </a>
            </li>
            <li class="nav-item">
                <!-- Active Class on Assignments -->
                <a href="./Assignments.html" class="nav-link active">
                    <i class="fa-regular fa-file-lines"></i> Assignments
                </a>
            </li>
            <li class="nav-item">
                <a href="../Projects/Projects.html" class="nav-link">
                    <i class="fa-regular fa-folder"></i> Projects
                </a>
            </li>
            <li class="nav-item">
                <a href="../Grades/grades.html" class="nav-link">
                    <i class="fa-solid fa-award"></i> Grades
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
        <a href="../courses.html" class="back-btn">
                <i class="fa-solid fa-arrow-left-long" style="margin-right:8px"></i>
                    Return to Courses
        </a>
            <div class="course-meta">
                <h4>CS 101: Web Development</h4>
                <span>Fall 2024 • Week 4</span>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- TOP BAR (Toggle Button) -->
        <div class="top-bar">
            <!-- Breadcrumb or Spacer -->
            <div class="breadcrumbs"></div> 
            
            <button class="theme-toggle-btn" id="themeBtn">
                <i class="fa-solid fa-sun"></i> <span>Light Mode</span>
            </button>
        </div>

        <!-- Assignments Header Area -->
        <div class="page-header">
            <div class="header-top-row">
                <div class="header-titles">
                    <h1>Assignments</h1>
                    <p id="course-term">CS 101: Web Development • Fall 2024</p>
                </div>
                <div class="header-stats">
                    <div class="stat-line">
                        <span id="completed-count">0 of 0 completed</span>
                    </div>
                    <div class="stat-line secondary">
                        <i class="fa-solid fa-medal"></i> 
                        <span id="points-count">0 / 0 points earned</span>
                    </div>
                </div>
            </div>
            
            <!-- Large Progress Bar -->
            <div class="header-progress-track">
                <div class="header-progress-fill" id="overall-progress" style="width: 0%"></div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="submitted">Submitted</button>
            <button class="filter-btn" data-filter="graded">Graded</button>
        </div>

        <!-- Assignments List Container (Dynamic) -->
        <div class="assignments-list" id="assignments-container">
            <!-- JS will populate cards here -->
        </div>

    </main>

        <script src="/react-bootstrap.js"></script>
    <script src="/Courses/Assignments/Assignments.js"></script>
</body>
</html>
