<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Courses</title>
    <script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/Courses/courses.css">
</head>
<body>
    <div id="app-root" hidden></div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <!-- LOGO AREA -->
        <div class="logo-area">
            <!-- Default to light logo -->
            <img src="../Assets/images/logo-light.png" alt="Nibras Logo" class="sidebar-logo" id="app-logo">
        </div>

        <ul class="nav-menu">
            <li class="nav-item"><a href="../Dashboard/dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li class="nav-item"><a href="./courses.html" class="nav-link active"><i class="fa-solid fa-book-open"></i> Courses</a></li>
            <li class="nav-item"><a href="../Competitions/Contests/contest.html" class="nav-link"><i class="fa-solid fa-trophy"></i> Competitions</a></li>
            <li class="nav-item"><a href="../Community/community.html" class="nav-link"><i class="fa-solid fa-users"></i> Community</a></li>
            <li class="nav-item"><a href="../Achievements/Achievements/achievements.html" class="nav-link"><i class="fa-solid fa-medal"></i> Achievements</a></li>
            <li class="nav-item"><a href="../Ai-tutor/Ai%20Tutor/ai_tutor.html" class="nav-link"><i class="fa-solid fa-robot"></i> AI Tutor</a></li>
            <li class="nav-item"><a href="../Analytics/Overview/overview.html" class="nav-link"><i class="fa-solid fa-chart-simple"></i> Analytics</a></li>
            <li class="nav-item"><a href="../Settings/settings.html" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>

        <div class="user-profile">
            <div class="avatar-circle">ZA</div>
            <div class="user-info">
                <h4>Ziad Alaa</h4>
                <span>student</span>
            </div>
        </div>
        
        <div class="reputation-box">
            <span>Reputation</span>
            <div class="rep-badge">1250</div>
        </div>

        <a href="../Login/loginPage/login.html" class="logout-btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- HEADER -->
        <header class="top-header">
            <div class="search-bar-global">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search courses, problems">
            </div>
            
            <div class="header-actions">
                <!-- Theme Toggle Button -->
                <button class="icon-btn" id="themeBtn"><i class="fa-regular fa-moon"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <div class="profile-circle-small">ZA</div>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="page-title-section">
                <h1>Courses</h1>
                <p>Manage your learning journey</p>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="course-search" placeholder="Search courses...">
            </div>

            <!-- Tabs -->
            <div class="tabs-container">
                <button class="tab-btn active" data-category="all">All Courses</button>
                <button class="tab-btn" data-category="core">Core Courses</button>
                <button class="tab-btn" data-category="elective">Electives</button>
                <button class="tab-btn" data-category="comp_prog">Competitive Programming</button>
            </div>

            <div class="course-count-label">
                My Courses <span class="count-badge" id="course-count">0</span>
            </div>

            <!-- Grid Container -->
            <div class="courses-grid" id="courses-container">
                <!-- JS will inject cards here -->
            </div>
        </div>

    </main>

        <script src="/react-bootstrap.js"></script>
    <script src="/Courses/courses.js"></script>
</body>
</html>
