<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiBras - Catalog</title>
    <script>
    (function () {
        var t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
    })();
    </script>
    <link rel="stylesheet" href="catalog.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <img src="../Assets/images/logo-light.png" alt="Nibras Logo" class="sidebar-logo">
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-book"></i> Courses</a></li>
            <li class="nav-item"><a href="./projects.html" class="nav-link"><i class="fas fa-folder-open"></i> Projects</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-trophy"></i> Competitions</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-users"></i> Community</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-medal"></i> Achievements</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-robot"></i> AI Tutor</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-chart-bar"></i> Analytics</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fas fa-cog"></i> Settings</a></li>
        </ul>
        <div class="user-profile">
            <div class="avatar-circle">U</div>
            <div class="user-info"><h4>User</h4><span>Student</span></div>
        </div>
        <div class="reputation-box">Reputation <span class="rep-badge">0</span></div>
        <button class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <nav class="top-nav">
                <a href="./projects.html" class="nav-tab">Projects</a>
                <a href="./catalog.html" class="nav-tab active">Catalog</a>
                <a href="./planner.html" class="nav-tab">Planner</a>
            </nav>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                <button class="icon-btn"><i class="fas fa-bell"></i></button>
                <div class="profile-circle-small">U</div>
            </div>
        </header>

        <div class="content-wrapper">
            <!-- Add your catalog content here -->
        </div>
    </main>

    <script src="../react-page-utils.js"></script>
    <script>if (window.NibrasShared?.session?.updateUserInfoDisplay) window.NibrasShared.session.updateUserInfoDisplay();</script>
    <script src="../config.js"></script>
    <script src="../services/api.js"></script>
    <script src="../react-bootstrap.js"></script>
    <script src="./catalog.js"></script>
    <script src="../services/gamification-ui.js"></script>
</body>
</html>
