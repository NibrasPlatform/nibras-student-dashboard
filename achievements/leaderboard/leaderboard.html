<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="leaderboard.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-area">
            <img src="../../assets/images/logo-light.png" alt="Nibras Logo" class="sidebar-logo" id="app-logo">
        </div>

        <ul class="nav-menu">
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-book-open"></i> Courses</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-trophy"></i> Competitions</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-users"></i> Community</a></li>
            <!-- Active State -->
            <li class="nav-item"><a href="#" class="nav-link active"><i class="fa-solid fa-medal"></i> Achievements</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-robot"></i> AI Tutor</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-chart-simple"></i> Analytics</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>

        <div class="user-profile">
            <div class="avatar-circle">ZA</div>
            <div class="user-info">
                <h4>Ziad Alaa</h4>
                <span>student</span>
            </div>
        </div>
        
        <div class="reputation-box">
            <span>Reputation</span>
            <div class="rep-badge">1250</div>
        </div>

        <button class="logout-btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        
        <!-- HEADER -->
        <header class="top-header">
            <div class="search-bar-global">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search courses, problems">
            </div>
            
            <div class="header-actions">
                <button class="icon-btn" id="themeBtn"><i class="fa-regular fa-moon"></i></button>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <div class="profile-circle-small">ZA</div>
            </div>
        </header>

        <div class="content-wrapper">
            
            <!-- Page Title -->
            <div class="page-title-section">
                <h1>Achievements & Reputation</h1>
                <p>Track your progress and compete with peers</p>
            </div>

            <!-- Current User Rank Card (Sticky/Highlight) -->
            <div class="user-rank-card" id="user-rank-container">
                <!-- JS Injected -->
            </div>

            <!-- Segmented Control Tabs -->
            <div class="segment-tabs">
                <button class="seg-btn">Achievements</button>
                <button class="seg-btn active">Leaderboard</button>
                <button class="seg-btn">Reputation</button>
            </div>

            <!-- Filter Pills -->
            <div class="filter-pills">
                <button class="pill-btn active">Overall</button>
                <button class="pill-btn">This Week</button>
                <button class="pill-btn">By Course</button>
                <button class="pill-btn">Achievements</button>
            </div>

            <!-- Leaderboard Table Section -->
            <section class="leaderboard-section">
                <h3 class="lb-title"><i class="fa-solid fa-trophy"></i> Overall Leaderboard</h3>
                <p class="lb-subtitle">Top performers ranked on activities</p>
                
                <div class="leaderboard-list" id="leaderboard-container">
                    <!-- JS Injected -->
                </div>
            </section>

        </div>
    </main>

    <script src="leaderboard.js"></script>
</body>
</html>
