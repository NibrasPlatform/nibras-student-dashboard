<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nibras - Sign Up</title>
    <script>
    (function () {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
    })();
</script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="signup-ins.css">
</head>
<body class="signup-page">

    <!-- Starry Background (Visible Only in Dark Mode) -->
    <div class="stars-container">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </div>

    <!-- Header -->
    <header class="auth-header">
        <div class="logo-area">
            <!-- Logo is white in both designs -->
            <img src="../../../Assets/images/logo-dark.png" alt="Nibras Logo" class="auth-logo">
        </div>
        
        <!-- Theme Toggle Button -->
        <button class="theme-toggle-btn" id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <!-- Main Content -->
    <div class="auth-container">
        <div class="auth-card">
            
            <h2 class="auth-title">Create an account</h2>

            <form id="signupForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="name@gmail.com" class="form-control">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" placeholder="Enter your password" class="form-control" id="passInput">
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePass('passInput', this)"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" placeholder="Enter your password" class="form-control" id="confPassInput">
                        <i class="fa-regular fa-eye toggle-password" onclick="togglePass('confPassInput', this)"></i>
                    </div>
                </div>

                <a href="department/department.html" type="submit" class="btn-login" style="margin-top: 1rem;">Sign Up</a>

                <!-- Role Toggle Link -->
                <div class="signup-link">
                    <span id="roleQuestion">Are You student ?</span> 
                    <a href="../signup.html" id="roleToggleBtn" onclick="toggleRole(event)">Sign Up</a>
                </div>

                <div class="signup-link" style="margin-top: 0.5rem;">
                    Already Have An Account ? <a href="../loginPage/login.html">Log In</a>
                </div>
            </form>

        </div>
    </div>

    <script src="signup-ins.js"></script>
</body>
</html>
